<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xiaocia // homepage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(255, 255, 255, 0.06); 
            --inner-glass: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --discord: #5865F2;
            --whatsapp: #25D366;
            --spotify: #1DB954;
            --electric: linear-gradient(45deg, #00f2fe, #4facfe, #7367f0, #f093fb, #00f2fe);
            --online: #23a55a;
            --idle: #f0b232;
            --dnd: #f23f43;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-drag: none; }

        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; position: relative; }

        body::before {
            content: ""; position: fixed; inset: -150px; z-index: -1;
            background: var(--electric); background-size: 400% 400%;
            -webkit-mask-image: url("topo.svg"); mask-image: url("topo.svg");
            -webkit-mask-size: 800px; mask-size: 800px;
            -webkit-mask-repeat: repeat; mask-repeat: repeat;
            opacity: 0.6; -webkit-transform: translateZ(0); transform: translateZ(0);
            will-change: background-position, mask-position;
            animation: flowWave 15s linear infinite, moveTopo 60s linear infinite;
        }

        @keyframes flowWave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes moveTopo { 0% { mask-position: 0 0; -webkit-mask-position: 0 0; } 100% { mask-position: 800px 400px; -webkit-mask-position: 800px 400px; } }

        .overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(40px) saturate(200%); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.8s; }
        .overlay-text { font-size: 50px; color: #fff; font-weight: 700; letter-spacing: 15px; opacity: 0.5; }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px) saturate(180%) contrast(100%);
            -webkit-backdrop-filter: blur(12px) saturate(180%) contrast(100%);
            border-radius: 40px; padding: 50px 30px; text-align: center; max-width: 380px; width: 92%; 
            opacity: 0; transform: scale(0.9); position: relative;
            border: none;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
            transition: 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .profile-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 40px; 
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.05) 40%, rgba(255,255,255,0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 20;
        }

        .avatar-container { position: relative; width: 125px; height: 125px; margin: 0 auto 15px; z-index: 15; }
        .user-avatar { width: 105px; height: 105px; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; object-fit: cover; }
        .avatar-deco { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .badges-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; z-index: 15; position: relative; }
        .badge-icon { width: 22px; height: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .profile-info { position: relative; z-index: 15; }
        .profile-info h2 { font-weight: 700; color: #fff; margin: 0; font-size: 2rem; letter-spacing: -0.8px; }
        .profile-info p { font-size: 0.9rem; color: #ccc; margin: 10px 0 25px; line-height: 1.6; opacity: 0.8; }

        .status-list { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; padding: 10px; background: var(--inner-glass); border-radius: 20px; position: relative; z-index: 15; border: 1px solid rgba(255,255,255,0.1); }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255, 255, 255, 0.1); }
        .status-icon { width: 10px; height: 10px; position: relative; display: inline-block; background: currentColor; }
        .online-circle { border-radius: 50%; }
        .idle-moon { background: transparent; border-radius: 50%; box-shadow: inset -3.5px -2.5px 0 0 currentColor; transform: rotate(-15deg); }
        .dnd-sphere { border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .dnd-sphere::before { content: ""; width: 70%; height: 2px; background: rgba(0,0,0,0.6); border-radius: 1px; }

        .status-item.active-online { color: var(--online); opacity: 1; filter: drop-shadow(0 0 5px rgba(35, 165, 90, 0.4)); }
        .status-item.active-idle { color: var(--idle); opacity: 1; filter: drop-shadow(0 0 5px rgba(240, 178, 50, 0.4)); }
        .status-item.active-dnd { color: var(--dnd); opacity: 1; filter: drop-shadow(0 0 5px rgba(242, 63, 67, 0.4)); }

        .activity-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; text-align: left; width: 100%; position: relative; z-index: 15; }
        .status-label { font-size: 0.65rem; font-weight: 800; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; padding-left: 5px; }
        .status-label span { color: rgba(255, 255, 255, 0.4); text-transform: lowercase; font-weight: 400; }

        .act-card { background: var(--inner-glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 14px; display: flex; align-items: center; gap: 14px; overflow: hidden; }
        .act-img { width: 52px; height: 52px; border-radius: 14px; object-fit: cover; background: #000; flex-shrink: 0; }
        .act-info { flex: 1; min-width: 0; overflow: hidden; }
        .act-info h4 { font-size: 0.85rem; color: #fff; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .act-info p { font-size: 0.7rem; color: #aaa; margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .social-icons { list-style: none; padding: 0; display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; position: relative; z-index: 15; }
        .social-link { text-decoration: none; color: #fff; width: 52px; height: 52px; border-radius: 18px; display: flex; justify-content: center; align-items: center; transition: 0.4s; font-size: 22px; border: 1px solid rgba(255,255,255,0.1); background: var(--inner-glass); }
        .social-link.discord:hover { background: var(--discord); box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3); }
        .social-link.whatsapp:hover { background: var(--whatsapp); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); }
        .social-link.banned { cursor: not-allowed; opacity: 0.25; filter: grayscale(1); }

        .music-player { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; position: relative; z-index: 15; }
        .play-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 26px; }
        .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; overflow: hidden; }
        #progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.2s linear; }

        @media (max-width: 480px) { .profile-card { padding: 40px 20px; border-radius: 35px; } }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="overlay" class="overlay" onclick="startPage()">
        <div class="overlay-text">あ!</div>
    </div>

    <div class="profile-card" id="profile-card">
        <div class="avatar-container">
            <img class="user-avatar" id="main-avatar" src="" alt="">
            <img class="avatar-deco" id="avatar-deco" src="" alt="">
        </div>
        <div class="badges-container" id="badges-grid"></div>
        <div class="profile-info">
            <h2>ハロー！</h2>
            <p>なまえは しあおしあ です،<br>はじめまして。( ᗜˬᗜ )</p>
        </div>
        <div class="status-list">
            <div class="status-item" id="stat-online"><div class="status-icon online-circle"></div>Online</div>
            <div class="status-item" id="stat-idle"><div class="status-icon idle-moon"></div>Idle</div>
            <div class="status-item" id="stat-dnd"><div class="status-icon dnd-sphere"></div>DND</div>
        </div>
        <div class="activity-section">
            <div id="game-act" style="display: none;">
                <div class="status-label" style="color: var(--discord);">Playing Now</div>
                <div class="act-card">
                    <img id="game-img" src="" class="act-img">
                    <div class="act-info">
                        <h4 id="game-name">...</h4>
                        <p id="game-detail">...</p>
                    </div>
                </div>
            </div>
            <div id="spotify-act" style="display: none;">
                <div class="status-label" style="color: var(--spotify);">I'm listening to Spotify <span>(not you)</span></div>
                <div class="act-card" style="border-color: rgba(29, 185, 84, 0.2);">
                    <img id="spotify-img" src="" class="act-img">
                    <div class="act-info"><h4 id="spotify-name">...</h4><p id="spotify-artist">...</p></div>
                </div>
            </div>
        </div>
        <div class="social-icons">
            <a href="https://discordapp.com/users/630062323448676352" target="_blank" class="social-link discord"><i class="fab fa-discord"></i></a>
            <a href="javascript:void(0)" class="social-link instagram banned"><i class="fab fa-instagram"></i></a>
            <a href="javascript:void(0)" class="social-link facebook banned"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/33525330188?text=.menu" target="_blank" class="social-link whatsapp"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div class="music-player">
            <audio id="audio-player" loop><source src="ArcaneTheBridge.mp3" type="audio/mpeg"></audio>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="play-btn" onclick="toggleMusic()" id="play-pause"><i class="fas fa-play"></i></button>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        const USER_ID = '630062323448676352';
        const BADGE_MAP = { 1:"discordstaff", 2:"discordpartner", 4:"hypesquadevents", 8:"bughunterlevel1", 64:"hypesquadbravery", 128:"hypesquadbrilliance", 256:"hypesquadbalance", 512:"earlysupporter", 16384:"bughunterlevel2", 131072:"discordcertifiedmoderator", 4194304:"activedeveloper" };

        function formatDuration(start) {
            const diff = Date.now() - start;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')} elapsed`;
        }

        function startPage() { document.getElementById('overlay').style.opacity = '0'; setTimeout(() => document.getElementById('overlay').style.display = 'none', 800); const card = document.getElementById('profile-card'); card.style.opacity = '1'; card.style.transform = 'scale(1) translateY(0)'; document.getElementById('audio-player').play(); document.getElementById('play-pause').innerHTML = '<i class="fas fa-pause"></i>'; }
        function toggleMusic() { const a = document.getElementById('audio-player'); const b = document.getElementById('play-pause'); if (a.paused) { a.play(); b.innerHTML = '<i class="fas fa-pause"></i>'; } else { a.pause(); b.innerHTML = '<i class="fas fa-play"></i>'; } }
        const audioEl = document.getElementById('audio-player'); audioEl.addEventListener('timeupdate', () => { const fill = document.getElementById('progress-fill'); if (fill) fill.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%'; });

        async function updateLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await res.json();
                const u = data.discord_user;

                document.getElementById('main-avatar').src = `https://cdn.discordapp.com/avatars/${USER_ID}/${u.avatar}.png?size=256`;
                if(u.avatar_decoration_data) { document.getElementById('avatar-deco').src = `https://cdn.discordapp.com/avatar-decoration-presets/${u.avatar_decoration_data.asset}.png`; document.getElementById('avatar-deco').style.display = 'block'; } else { document.getElementById('avatar-deco').style.display = 'none'; }
                const sOn = document.getElementById('stat-online'), sId = document.getElementById('stat-idle'), sDn = document.getElementById('stat-dnd'); sOn.className = sId.className = sDn.className = 'status-item';
                if (data.discord_status === 'online') sOn.classList.add('active-online'); else if (data.discord_status === 'idle') sId.classList.add('active-idle'); else if (data.discord_status === 'dnd') sDn.classList.add('active-dnd');
                const grid = document.getElementById('badges-grid'); grid.innerHTML = ''; Object.keys(BADGE_MAP).forEach(f => { if (u.public_flags & f) grid.innerHTML += `<img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/${BADGE_MAP[f]}.svg" class="badge-icon">`; });

                const game = data.activities.find(a => a.type === 0);
                if(game) {
                    document.getElementById('game-act').style.display = 'block';
                    document.getElementById('game-name').innerText = game.name;
                    
                    // Logic for time playing
                    if(game.timestamps && game.timestamps.start) {
                        document.getElementById('game-detail').innerText = `${game.details || ''} (${formatDuration(game.timestamps.start)})`;
                    } else {
                        document.getElementById('game-detail').innerText = game.details || 'In Game';
                    }

                    let img = 'https://i.imgur.com/3QjqZ3p.png';
                    if(game.assets?.large_image) { if(game.assets.large_image.startsWith("mp:")) img = `https://media.discordapp.net/${game.assets.large_image.replace("mp:", "")}`; else if(game.assets.large_image.startsWith("external:")) img = `https://media.discordapp.net/external/${game.assets.large_image.split("external:")[1]}`; else img = `https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`; }
                    document.getElementById('game-img').src = img;
                } else { document.getElementById('game-act').style.display = 'none'; }

                if(data.listening_to_spotify) {
                    document.getElementById('spotify-act').style.display = 'block';
                    document.getElementById('spotify-name').innerText = data.spotify.song;
                    document.getElementById('spotify-artist').innerText = data.spotify.artist;
                    document.getElementById('spotify-img').src = data.spotify.album_art_url;
                } else { document.getElementById('spotify-act').style.display = 'none'; }
            } catch (e) { console.error(e); }
        }
        updateLanyard(); setInterval(updateLanyard, 1000); // 1s biar timernya update terus
    </script>
</body>
</html>
