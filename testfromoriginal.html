<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xiaocia // homepage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --card-bg: rgba(13, 13, 15, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --text: #e1e1e1;
            --discord: #5865F2;
            --instagram: #E1306C;
            --facebook: #1877F2;
            --whatsapp: #25D366;
            --spotify: #1DB954;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent; /* No blue click overlay */
            user-select: none; /* No text highlight */
        }

        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-color: var(--bg); background-image: url("topo.svg");
            background-size: cover; background-attachment: fixed;
            color: var(--text); overflow: hidden;
        }

        /* OVERLAY */
        .overlay {
            position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px); z-index: 9999; display: flex;
            justify-content: center; align-items: center; cursor: pointer; transition: 0.6s;
        }
        .overlay-text { font-size: 45px; color: #fff; font-weight: 700; letter-spacing: 15px; opacity: 0.8; }

        /* ELITE CARD */
        .profile-card {
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 28px; border: 1px solid var(--border); padding: 45px 30px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7); text-align: center;
            max-width: 400px; width: 92%; opacity: 0; transform: translateY(30px);
            background: var(--card-bg); transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* AVATAR SYSTEM */
        .avatar-container { position: relative; width: 125px; height: 125px; margin: 0 auto 15px; }
        .user-avatar { width: 100px; height: 100px; border-radius: 50%; position: absolute; top: 12.5px; left: 12.5px; z-index: 1; object-fit: cover; border: 3px solid transparent; }
        .avatar-deco { width: 125px; height: 125px; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        /* BADGES */
        .badges-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; min-height: 24px; }
        .badge-icon { width: 22px; height: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .profile-info h2 { font-weight: 700; color: #fff; margin: 0; font-size: 1.9rem; letter-spacing: -0.5px; }
        .profile-info p { font-size: 0.95rem; color: #999; margin: 10px 0 25px; line-height: 1.6; font-weight: 300; }

        /* ACTIVITIES (STACKED) */
        .activity-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; text-align: left; }
        .act-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 14px;
        }
        .act-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #000; flex-shrink: 0; }
        .act-info h4 { font-size: 0.9rem; color: #fff; margin: 0; }
        .act-info p { font-size: 0.75rem; color: #777; margin: 3px 0 0; }
        .status-label { font-size: 0.65rem; font-weight: 800; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; }

        /* SOCIALS WITH BRAND COLORS */
        .social-icons { list-style: none; padding: 0; display: flex; justify-content: center; gap: 14px; margin-bottom: 30px; }
        .social-link {
            text-decoration: none; color: #fff; width: 50px; height: 50px; border-radius: 16px;
            display: flex; justify-content: center; align-items: center; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 22px; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.04); position: relative;
        }
        
        /* Brand Color Logic */
        .social-link.discord:hover { background: var(--discord); border-color: var(--discord); box-shadow: 0 0 20px rgba(88, 101, 242, 0.4); }
        .social-link.instagram:hover { background: var(--instagram); border-color: var(--instagram); box-shadow: 0 0 20px rgba(225, 48, 108, 0.4); }
        .social-link.facebook:hover { background: var(--facebook); border-color: var(--facebook); box-shadow: 0 0 20px rgba(24, 119, 242, 0.4); }
        .social-link.whatsapp:hover { background: var(--whatsapp); border-color: var(--whatsapp); box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }

        .social-link.banned { cursor: not-allowed; opacity: 0.3; filter: grayscale(1); }
        .social-link.banned:hover { background: rgba(255,255,255,0.05); border-color: var(--border); box-shadow: none; transform: none; }
        .social-link.banned::after { content: '🚫'; position: absolute; font-size: 18px; color: rgba(255,255,255,0.5); }

        /* PLAYER */
        .music-player { border-top: 1px solid var(--border); padding-top: 30px; }
        .play-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 24px; transition: 0.3s; }
        .play-btn:hover { transform: scale(1.1); }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 10px; position: relative; overflow: hidden; }
        #progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.2s linear; }

        @media (max-width: 480px) { .profile-card { padding: 40px 20px; } }
    </style>
</head>

<body oncontextmenu="return false;"> <div id="overlay" class="overlay" onclick="startPage()">
        <div class="overlay-text">あ!</div>
    </div>

    <div class="profile-card" id="profile-card">
        <div class="avatar-container">
            <img class="user-avatar" id="main-avatar" src="" alt="">
            <img class="avatar-deco" id="avatar-deco" src="" alt="">
        </div>

        <div class="badges-container" id="badges-grid"></div>

        <div class="profile-info">
            <h2>ハロー！</h2>
            <p>なまえは しあおしあ です、<br>はじめまして。( ᗜˬᗜ )</p>
        </div>

        <div class="activity-section">
            <div id="game-act" style="display: none;">
                <div class="status-label" style="color: var(--discord);">Playing Now</div>
                <div class="act-card">
                    <img id="game-img" src="" class="act-img">
                    <div class="act-info">
                        <h4 id="game-name">...</h4>
                        <p id="game-detail">...</p>
                    </div>
                </div>
            </div>

            <div id="spotify-act" style="display: none;">
                <div class="status-label" style="color: var(--spotify);">Listening to Spotify</div>
                <div class="act-card" style="border-color: rgba(29, 185, 84, 0.2);">
                    <img id="spotify-img" src="" class="act-img">
                    <div class="act-info">
                        <h4 id="spotify-name">...</h4>
                        <p id="spotify-artist">...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="social-icons">
            <a href="https://discordapp.com/users/630062323448676352" target="_blank" class="social-link discord"><i class="fab fa-discord"></i></a>
            <a href="javascript:void(0)" class="social-link instagram banned"><i class="fab fa-instagram"></i></a>
            <a href="javascript:void(0)" class="social-link facebook banned"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/33525330188?text=.menu" target="_blank" class="social-link whatsapp"><i class="fab fa-whatsapp"></i></a>
        </div>

        <div class="music-player">
            <audio id="audio-player" loop><source src="ArcaneTheBridge.mp3" type="audio/mpeg"></audio>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="play-btn" onclick="toggleMusic()" id="play-pause"><i class="fas fa-play"></i></button>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        const USER_ID = '630062323448676352';
        const BADGE_MAP = { 1:"discordstaff", 2:"discordpartner", 4:"hypesquadevents", 8:"bughunterlevel1", 64:"hypesquadbravery", 128:"hypesquadbrilliance", 256:"hypesquadbalance", 512:"earlysupporter", 16384:"bughunterlevel2", 131072:"discordcertifiedmoderator", 4194304:"activedeveloper" };

        function startPage() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 600);
            const card = document.getElementById('profile-card');
            card.style.opacity = '1'; card.style.transform = 'translateY(0)';
            document.getElementById('audio-player').play();
            document.getElementById('play-pause').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function toggleMusic() {
            const a = document.getElementById('audio-player');
            const b = document.getElementById('play-pause');
            if (a.paused) { a.play(); b.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { a.pause(); b.innerHTML = '<i class="fas fa-play"></i>'; }
        }

        const audioEl = document.getElementById('audio-player');
        audioEl.addEventListener('timeupdate', () => {
            document.getElementById('progress-fill').style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
        });

        async function updateLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await res.json();
                const u = data.discord_user;

                document.getElementById('main-avatar').src = `https://cdn.discordapp.com/avatars/${USER_ID}/${u.avatar}.png?size=256`;
                if(u.avatar_decoration_data) {
                    document.getElementById('avatar-deco').src = `https://cdn.discordapp.com/avatar-decoration-presets/${u.avatar_decoration_data.asset}.png`;
                    document.getElementById('avatar-deco').style.display = 'block';
                } else { document.getElementById('avatar-deco').style.display = 'none'; }

                const sc = { online: '#23a55a', idle: '#f0b232', dnd: '#f23f43', offline: '#80848e' };
                document.getElementById('main-avatar').style.borderColor = sc[data.discord_status];

                const grid = document.getElementById('badges-grid'); grid.innerHTML = '';
                Object.keys(BADGE_MAP).forEach(f => { if (u.public_flags & f) grid.innerHTML += `<img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/${BADGE_MAP[f]}.svg" class="badge-icon">`; });

                const game = data.activities.find(a => a.type === 0);
                const gBox = document.getElementById('game-act');
                if(game) {
                    gBox.style.display = 'block';
                    document.getElementById('game-name').innerText = game.name;
                    document.getElementById('game-detail').innerText = game.details || 'In Game';
                    let img = 'https://i.imgur.com/3QjqZ3p.png';
                    if(game.assets?.large_image) {
                        if(game.assets.large_image.startsWith("mp:")) img = `https://media.discordapp.net/${game.assets.large_image.replace("mp:", "")}`;
                        else if(game.assets.large_image.startsWith("external:")) img = `https://media.discordapp.net/external/${game.assets.large_image.split("external:")[1]}`;
                        else img = `https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`;
                    }
                    document.getElementById('game-img').src = img;
                } else { gBox.style.display = 'none'; }

                const sBox = document.getElementById('spotify-act');
                if(data.listening_to_spotify) {
                    sBox.style.display = 'block';
                    document.getElementById('spotify-name').innerText = data.spotify.song;
                    document.getElementById('spotify-artist').innerText = data.spotify.artist;
                    document.getElementById('spotify-img').src = data.spotify.album_art_url;
                } else { sBox.style.display = 'none'; }

            } catch (e) { console.error(e); }
        }

        updateLanyard();
        setInterval(updateLanyard, 5000);
    </script>
</body>
</html>
