<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xiaocia — terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #1e1e1e;
  --fg:      #d4d4d4;
  --dim:     #6b6b6b;
  --green:   #98c379;
  --yellow:  #e5c07b;
  --blue:    #61afef;
  --cyan:    #56b6c2;
  --red:     #e06c75;
  --magenta: #c678dd;
  --white:   #abb2bf;
}

html, body {
  height: 100%;
  background: #111;
  color: var(--fg);
  font-family: 'JetBrains Mono', 'Menlo', 'Monaco', monospace;
  font-size: 13.5px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── WINDOW ── */
.window {
  max-width: 800px;
  height: calc(100vh - 64px);
  margin: 32px auto;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.75);
  display: flex;
  flex-direction: column;
}

.titlebar {
  background: #2d2d2d;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #111;
  user-select: none;
  flex-shrink: 0;
}

.btn { width: 12px; height: 12px; border-radius: 50%; }
.btn-close { background: #ff5f57; }
.btn-min   { background: #febc2e; }
.btn-max   { background: #28c840; }

.title-text {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #777;
}

/* ── TERMINAL BODY ── */
.term {
  background: var(--bg);
  flex: 1;
  overflow-y: auto;
  cursor: text;
  padding: 12px 16px 16px;
}

/* scrollbar */
.term::-webkit-scrollbar { width: 5px; }
.term::-webkit-scrollbar-track { background: transparent; }
.term::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }

/* ── LINES ── */
.ln {
  display: block;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 1.55em;
}

/* color helpers */
.g  { color: var(--green);   }
.y  { color: var(--yellow);  }
.b  { color: var(--blue);    }
.cy { color: var(--cyan);    }
.r  { color: var(--red);     }
.m  { color: var(--magenta); }
.d  { color: var(--dim);     }
.bd { font-weight: 700;      }

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── INPUT ── */
.input-row {
  display: flex;
  align-items: baseline;
  margin-top: 1px;
}

.ps { white-space: pre; flex-shrink: 0; }

#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  caret-color: transparent;
  padding: 0;
}

/* block cursor */
.input-row {
  position: relative;
}

.cursor-block {
  position: absolute;
  width: 0.6em;
  height: 1.15em;
  background: var(--fg);
  pointer-events: none;
  animation: blink 1.2s step-end infinite;
  translate: 0 1px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

@media (max-width: 840px) {
  .window { margin: 0; border-radius: 0; height: 100dvh; box-shadow: none; }
  html, body { font-size: 12px; }
}
</style>
</head>

/* ── output helpers ── */
let _printQueue = [];
let _printing   = false;
let _printDelay = 28;

function _flushQueue() {
  if (_printing || _printQueue.length === 0) return;
  _printing = true;

  function next() {
    if (_printQueue.length === 0) {
      _printing = false;
      scroll();
      return;
    }
    const { html, isPre } = _printQueue.shift();
    if (isPre) {
      out.appendChild(html);
    } else {
      const d = document.createElement('div');
      d.className = 'ln';
      d.innerHTML = html;
      out.appendChild(d);
    }
    scroll();
    setTimeout(next, _printDelay);
  }
  next();
}

function w(html) {
  _printQueue.push({ html, isPre: false });
  _flushQueue();
}

function wNode(node) {
  _printQueue.push({ html: node, isPre: true });
  _flushQueue();
}

function blank() { w(''); }

// langsung print tanpa delay (untuk echo cmd & boot)
function wImmediate(html) {
  const d = document.createElement('div');
  d.className = 'ln';
  d.innerHTML = html;
  out.appendChild(d);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function echoCmd(cmd) {
  const d = document.createElement('div');
  d.className = 'ln';
  d.innerHTML = PROMPT_HTML + esc(cmd);

}

/* ── run ── */
async function run(raw) {
  if (_printing) return; // block input selama printing, tanpa sentuh keyboard
  const cmd = raw.trim();
  echoCmd(cmd);
  if (!cmd) { scroll(); return; }

  const key = cmd.split(/\s+/)[0].toLowerCase();
  if (cmds[key]) {
    await cmds[key](cmd);
  } else {
    blank();
    w('<span class="r">bash: ' + esc(key) + ': command not found</span>');
    w('<span class="d">type \'help\' for available commands</span>');
    blank();
  }
  scroll();
}

/* ── history ── */
let hist = [], hIdx = -1, saved = '';

inp.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const v = inp.value; inp.value = '';
    hIdx = -1; saved = '';
    if (v.trim()) { hist.unshift(v); if (hist.length > 200) hist.pop(); }
    await run(v);

  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (hIdx === -1) saved = inp.value;
    if (hIdx < hist.length - 1) inp.value = hist[++hIdx];

  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (hIdx > 0) inp.value = hist[--hIdx];
    else if (hIdx === 0) { hIdx = -1; inp.value = saved; }

  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    out.innerHTML = '';

  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    echoCmd(inp.value + '^C');
    inp.value = ''; blank(); scroll();
  }
});

/* ── BLOCK CURSOR ── */
const cursor = document.getElementById('cursor');

function updateCursor() {
  const tmp = document.createElement('span');
  tmp.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font-family:inherit;font-size:inherit;';
  tmp.textContent = inp.value.slice(0, inp.selectionStart);
  document.body.appendChild(tmp);
  const textW = tmp.getBoundingClientRect().width;
  document.body.removeChild(tmp);

  const promptW = ps.getBoundingClientRect().width;
  const newLeft = (promptW + textW) + 'px';
  if (cursor.style.left !== newLeft) cursor.style.left = newLeft;
}

inp.addEventListener('input',   updateCursor);
inp.addEventListener('keyup',   updateCursor);
inp.addEventListener('click',   updateCursor);
inp.addEventListener('focus', () => {
    cursor.style.animation = 'none';
    cursor.offsetHeight; // force reflow biar animation restart
    cursor.style.animation = 'blink 1.2s step-end infinite';
    updateCursor();
  });
inp.addEventListener('blur', () => { cursor.style.animation = 'none'; cursor.style.opacity = '0'; });

document.getElementById('term').addEventListener('click', () => inp.focus());
inp.focus();
updateCursor();
</script>
