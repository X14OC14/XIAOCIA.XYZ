<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XIAOCIA // LIVE</title>
<style>
html,body{
margin:0;
height:100%;
}
iframe{
border:none;
width:100%;
height:100%;
}
</style>
</head>

<body>

<iframe id="app"></iframe>

<script>
const routes = {
  "/": "glassmorphism.html",
  "/blog": "blog.html",
  "/tools": "tools.html",
  "/about": "about.html"
};

let path = window.location.pathname;

if (!routes[path]) {
  path = "/";
}

const frame = document.getElementById("app");

// cache busting otomatis
const cacheBuster = "?v=" + Date.now();

frame.src = routes[path] + cacheBuster;
</script>

</body>
</html>
