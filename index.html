<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xiaocia — interface</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="terminal.css">
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="btn btn-close"></div>
    <div class="btn btn-min"></div>
    <div class="btn btn-max"></div>
    <div class="title-text">xiaocia — bash — 80×24</div>
  </div>
  <div class="term" id="term">
    <div id="out"></div>
    <div class="input-row" id="input-row">
      <span class="ps" id="ps"></span>
      <div id="inp" contenteditable="true" spellcheck="false" autocorrect="off" autocapitalize="off"></div>
    </div>
  </div>
</div>

<div id="rick-overlay">
  <pre id="rick-pre"></pre>
  <div id="rick-close" onclick="hideRickOverlay()">[ press here or wait to dismiss ]</div>
</div>

<script src="terminal.js"></script>

</body>
</html>
