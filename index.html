<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xiaocia — terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #1e1e1e;
  --fg:      #d4d4d4;
  --dim:     #6b6b6b;
  --green:   #98c379;
  --yellow:  #e5c07b;
  --blue:    #61afef;
  --cyan:    #56b6c2;
  --red:     #e06c75;
  --magenta: #c678dd;
  --white:   #abb2bf;
}

html, body {
  height: 100%;
  background: #111;
  color: var(--fg);
  font-family: 'JetBrains Mono', 'Menlo', 'Monaco', monospace;
  font-size: 13.5px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── WINDOW ── */
.window {
  max-width: 800px;
  height: calc(100vh - 64px);
  margin: 32px auto;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.75);
  display: flex;
  flex-direction: column;
}

.titlebar {
  background: #2d2d2d;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #111;
  user-select: none;
  flex-shrink: 0;
}

.btn { width: 12px; height: 12px; border-radius: 50%; }
.btn-close { background: #ff5f57; }
.btn-min   { background: #febc2e; }
.btn-max   { background: #28c840; }

.title-text {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #777;
}

/* ── TERMINAL BODY ── */
.term {
  background: var(--bg);
  flex: 1;
  overflow-y: auto;
  cursor: text;
  padding: 12px 16px 16px;
}

/* scrollbar */
.term::-webkit-scrollbar { width: 5px; }
.term::-webkit-scrollbar-track { background: transparent; }
.term::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }

/* ── LINES ── */
.ln {
  display: block;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 1.55em;
}

/* color helpers */
.g  { color: var(--green);   }
.y  { color: var(--yellow);  }
.b  { color: var(--blue);    }
.cy { color: var(--cyan);    }
.r  { color: var(--red);     }
.m  { color: var(--magenta); }
.d  { color: var(--dim);     }
.bd { font-weight: 700;      }

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── INPUT ── */
.input-row {
  display: flex;
  align-items: flex-start;
  margin-top: 1px;
  position: relative;
}

.ps { white-space: pre; flex-shrink: 0; }

#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  caret-color: #ffffff;
  padding: 0;
  word-break: break-all;
  white-space: pre-wrap;
  min-height: 1.55em;
}

@media (max-width: 840px) {
  .window { margin: 0; border-radius: 0; height: 100dvh; box-shadow: none; }
  html, body { font-size: 12px; }
}
</style>
</head>
<body>

  <div class="titlebar">
    <div class="btn btn-close"></div>

  </div>
  <div class="term" id="term">
    <div id="out"></div>
    <div class="input-row" id="input-row">
      <span class="ps" id="ps"></span>
      <div id="inp" contenteditable="true" spellcheck="false" autocorrect="off" autocapitalize="off"></div>
    </div>
  </div>
</div>

<script>
'use strict';

const WA_URL  = 'https://wa.me/33525330188?text=.menu';
const DC_URL  = 'https://discordapp.com/users/' + USER_ID;

let lanyard = null;
async function pollLanyard() {

    lanyard = (await r.json()).data;

/* ── refs ── */
const out  = document.getElementById('out');
const inp  = document.getElementById('inp');
const ps   = document.getElementById('ps');
const term = document.getElementById('term');

function scroll() { term.scrollTop = term.scrollHeight; }
const PROMPT_HTML =
  '<span class="g bd">visitor</span>' +
  '<span class="d">@</span>' +
  '<span class="b bd">xiaocia.my.id</span>' +
  '<span class="d">:</span>' +
  '<span class="y">~</span>' +
  '<span class="d">$ </span>';

ps.innerHTML = PROMPT_HTML;

/* ── output helpers ── */
let _printQueue = [];
let _printing   = false;
let _printDelay = 28;

function _flushQueue() {
  if (_printing || _printQueue.length === 0) return;
  _printing = true;

  function next() {
    if (_printQueue.length === 0) {
      _printing = false;
      scroll();
      return;
    }
    const { html, isPre } = _printQueue.shift();
    if (isPre) {
      out.appendChild(html);
    } else {
      const d = document.createElement('div');
      d.className = 'ln';
      d.innerHTML = html;
      out.appendChild(d);
    }
    scroll();
    setTimeout(next, _printDelay);
  }
  next();
}

function w(html) {
  _printQueue.push({ html, isPre: false });
  _flushQueue();
}

function wNode(node) {
  _printQueue.push({ html: node, isPre: true });
  _flushQueue();
}

function blank() { w(''); }

// langsung print tanpa delay (untuk echo cmd & boot)
function wImmediate(html) {
  const d = document.createElement('div');
  d.className = 'ln';
  d.innerHTML = html;
  out.appendChild(d);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function echoCmd(cmd) {
  const d = document.createElement('div');
  d.className = 'ln';
  d.innerHTML = PROMPT_HTML + esc(cmd);
  out.appendChild(d);
}

function scroll() { term.scrollTop = term.scrollHeight; }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  const osVer    = (3 + Math.floor(Math.random() * 3)) + '.' + Math.floor(Math.random() * 10) + '.' + Math.floor(Math.random() * 20);
  const arch     = pick(['x86_64', 'aarch64', 'riscv64']);
  const kernelV  = (7 + Math.floor(Math.random() * 3)) + '.' + Math.floor(Math.random() * 15) + '.' + Math.floor(Math.random() * 100) + '-RELEASE';
  const cpuModel = pick(['DragonCore X9', 'DragonCore X12', 'DragoRisc V7', 'DragonCore Xm3', 'DragoLite A5']);
  const cpuFreq  = (3.2 + Math.random() * 2.2).toFixed(1);
  const ramTotal = pick([8, 16, 24, 32, 64]);
  const ramUsed  = (ramTotal * 0.15 + Math.random() * (ramTotal * 0.55)).toFixed(1);
  const shellV   = '5.' + Math.floor(Math.random() * 3) + '.' + Math.floor(Math.random() * 30);
  const wm       = pick(['drago-wm', 'dragcomp', 'wyrm', 'scales-wm']);

  function getAge() {
    const birth = new Date('2005-12-11T00:00:00');
    const now   = new Date();
    const diff  = now - birth;
    const d = Math.floor(diff / 1000 / 60 / 60 / 24);
    const h = Math.floor((diff / 1000 / 60 / 60) % 24);
    const m = Math.floor((diff / 1000 / 60) % 60);
    const s = Math.floor((diff / 1000) % 60);
    return d + 'd ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

/* ── NEOFETCH ── */
function printNeofetch() {
  const dragon = [
    '                                                           %                                        ',
    '                                                          ##                                        ',
    '                                                        %%%#          %                             ',
    '                                                      %%%%%          %%                             ',
    '                                                    %%%%%%        %%%%%                             ',
    '                                                 %%%%%%%%       #%%%%%                              ',
    '                                               %%%%%%%%%      %%%%%%#                               ',
    '                                            %%%%%%%%%%#   ##%%%%%%%%                                ',
    '                                         %%%%%%%%%%%%  #####%%%%%%                                  ',
    '                                       %%%%%%%%%%%%#########%%%#%                                   ',
    '                                    %%%%%%%%%################%#                                     ',
    '                                 %%%%%%%#####################                                       ',
    '                               %%%%%#######################       ##%                               ',
    '                             %%%%#######################   #####%   %%%%%%                          ',
    '                           %%%################################%%%%%   %%%%%%%                       ',
    '                           %################################%%%%%%%%#   %%%%%%%                     ',
    '                          ############   #################%%%%%%%%%%%%%  %%%%%%%%%                  ',
    '                         *#########     ###############%%%%%%%%%%%%%%%%#  %%%%%%%%%%                ',
    '                        ########      ####################%%%%%%%%%%%%%%#  %%%%%%%%%%               ',
    '                     ########################################%%%%%%%%%%%%%                          ',
    '                   #############################################%%%%%%%%%%%                         ',
    '             ###############################################%%%%%%%%%%%%%%%   #%                    ',
    '            ############################################    %%%%%%%%%%%%%%%%   %%                   ',
    '            ##############################################   %%%%%%%%%%%%%%%%  %%%%                 ',
    '           %##### ####################*#####################  %%%%%%%%%%%%%%%  %%%%%                ',
    '            #################  #################*#    ######   %%%%%%%%%%%%%%  %%%%%%               ',
    '            ############# ##########################           #%%%%%%%%%%%%%  %%%%%%               ',
    '             ######### ################        ######          ###%%%%%%%%%%%  %%%%%%%              ',
    '              #####  ###########                               ####%%%%%%%%%%      %%%              ',
    '               ###  ########                                  #####%%%%%%%%%%        %%             ',
    '                       #####                                 #######%%%%%%%%%                       ',
    '                                                            ########%%%%%%%%                        ',
    '                                                          *#########%%%%%%%                         ',
    '                                                       ***##########%%%%%%%  #                      ',
    '                                                    *****###########%%%%%%  %#%                     ',
    '                                               *********############%%%%%  #%%%                     ',
    '                                            **********#############%%%%   #%%%%                     ',
    '                                         ***********###############%%%   #%%%#                      ',
    '                                       ************################%    %#%%%#                      ',
    '                                     ************#################        #%%%                      ',
    '                                    ************###############            #%%                      ',
    '                                   ************#############               ##                       ',
    '                                  ************###########                                           ',
    '                                 #***********######*                                                ',
    '                                 ***********###                                                     ',
    '                                 *********                                                          ',
    '                                 **                                                                 ',
  ];

  const res   = window.screen.width + 'x' + window.screen.height;
  const tz    = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const lang  = navigator.language || 'id';
  const cores = navigator.hardwareConcurrency || '?';

  // naga — pre kecil sendiri
  const pre = document.createElement('pre');
  pre.style.fontFamily = 'inherit';
  pre.style.fontSize   = '5.5px';
  pre.style.lineHeight = '1.12';
  pre.style.margin     = '0';
  pre.style.whiteSpace = 'pre';

  let html = '';
  for (const line of dragon) {
    const escaped = line
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // tiap karakter dikasih warna sendiri sesuai "berat" unicode
    // % = paling terang (body), # = medium (detail), * = redup (ekor/shadow)
    const colored = escaped.replace(/[^\s]/g, ch => {
      let color;
      if (ch === '%')      color = '#fa003f'; // oranye terang - body
      else if (ch === '#') color = '#fa003f'; // merah medium - detail
      else if (ch === '*') color = '#fa003f'; // merah gelap - ekor/shadow
      else                 color = '#c0514a'; // fallback medium
      return '<span style="color:' + color + '">' + ch + '</span>';
    });
    html += colored + '\n';
  }
  pre.innerHTML = html;
  wNode(pre);

  // info — font normal via w()
  blank();
  w('<span class="g bd">visitor</span><span class="d">@</span><span class="b bd">xiaocia.my.id</span>');
  w('<span class="d">──────────────────────────────</span>');
  w('<span class="cy">OS         </span>  DragoNodes ' + osVer + ' ' + arch);
  w('<span class="cy">Kernel     </span>  dragond ' + kernelV);
  w('<span class="cy">Host       </span>  xiaocia.my.id');
  w('<span class="cy">Shell      </span>  bash ' + shellV);
  w('<span class="cy">WM         </span>  ' + wm);
  w('<span class="cy">Terminal   </span>  xiaocia-term 1.0');
  w('<span class="cy">CPU        </span>  ' + cpuModel + ' (' + cores + ') @ ' + cpuFreq + 'GHz');
  w('<span class="cy">Memory     </span>  ' + ramUsed + ' GB / ' + ramTotal + '.0 GB');
  w('<span class="cy">Resolution </span>  ' + res);
  w('<span class="cy">Timezone   </span>  ' + tz);
  w('<span class="cy">Locale     </span>  ' + lang);
  w('<span class="cy">Uptime     </span>  <span id="neo-uptime">' + getAge() + '</span>');

  // live update tiap detik
  setInterval(() => {
    const el = document.getElementById('neo-uptime');
    if (el) el.textContent = getAge();
  }, 1000);

  // color palette block
  // color palette — pakai div flex bukan unicode block
  const normalColors = ['#1a1a1a','#ff3b4e','#3ddc61','#ffd23f','#3b9eff','#d94fff','#1dd9cc','#c8c8c8'];
  const brightColors = ['#4a4a4a','#ff6b78','#6ff589','#ffe070','#6db8ff','#e87aff','#5aede6','#ffffff'];

  function makePaletteRow(colors) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;height:14px;margin:0;padding:0;line-height:0;font-size:0;';
    for (const c of colors) {
      const block = document.createElement('div');
      block.style.cssText = 'width:20px;height:14px;background:' + c + ';';
      wrap.appendChild(block);
    }
    return wrap;
  }

  const pal = document.createElement('div');
  pal.style.cssText = 'margin:4px 0;';
  pal.appendChild(makePaletteRow(normalColors));
  pal.appendChild(makePaletteRow(brightColors));
  _printQueue.push({ html: pal, isPre: true });
  _flushQueue();
  w('<span class="d">type </span><span class="g">help</span><span class="d"> for available commands</span>');
  blank();
}

/* ── boot ── */
(function bootLine() {
  const now = new Date();
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad = n => String(n).padStart(2,'0');
  const dateStr = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' +
                  String(now.getDate()).padStart(2,' ') + ' ' +
                  pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  const tty = 'ttys00' + ((now.getMinutes() % 4) + 1);
  wImmediate('Last login: ' + dateStr + ' on ' + tty);
})();
wImmediate('');

/* ── commands ── */
const cmds = {

  help() {
    blank();
    w('<span class="y bd">COMMANDS</span>');

    const rows = [
      ['whoami',    'print information about the owner'],

  async status() {
    blank();
    w('<span class="d">fetching from api.lanyard.rest...</span>');
    scroll();
    try {
      const r = await fetch('https://api.lanyard.rest/v1/users/' + USER_ID);
      const { data } = await r.json();
      lanyard = data;
      out.lastChild.remove();

      const COLOR = { online:'g', idle:'y', dnd:'r', offline:'d' };

      const s = data.discord_status || 'offline';
      const u = data.discord_user;

      if (data.listening_to_spotify) {

      blank();
    } catch(e) {
      out.lastChild.remove();
      w('<span class="r">error: could not reach api.lanyard.rest</span>');
      blank();

  clear() { out.innerHTML = ''; },

  'rm -rf /'() {
    blank();
    w('<span class="r bd">WARNING: You are about to delete the entire filesystem.</span>');
    w('<span class="d">This operation is</span> <span class="r">irreversible</span><span class="d">. All data will be permanently lost.</span>');
    blank();

/* ── run ── */
async function run(raw) {
  if (_printing) return;
  const cmd = raw.trim();
  echoCmd(cmd);
  if (!cmd) { scroll(); return; }

  const key = cmd.toLowerCase();
  // coba full command dulu (untuk rm -rf /), fallback ke kata pertama
  const handler = cmds[key] || cmds[cmd.split(/\s+/)[0].toLowerCase()];
  if (handler) {
    await handler(cmd);
  } else {
    blank();
    // 15% chance rare roast, 85% default
    const roasts = [
      // format: [line1, line2]
      [`bash: ${esc(cmd.split(/\s+/)[0])}: bro what is this`, `did you just make that up`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: not found (as expected)`, `type 'help' and actually read it this time`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: ???`, `this isn't google, run 'help'`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: command not found`, `skill issue. try 'help'`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: who told you this was a valid command`, `type 'help' before trying random stuff`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: nuh uh`, `'help' exists for a reason`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: i literally don't know what you want from me`, `try 'help'`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: not found, never existed, never will`, `type 'help'`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: bestie no`, `run 'help', please`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: command not found`, `what are you even trying to do. 'help'`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: i'm not ChatGPT, i can't guess what you mean`, `available commands: 'help'`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: deleted this one specifically because i knew you'd try it`, `'help'`],
    ];

    const toxic = [
      [`bash: ${esc(cmd.split(/\s+/)[0])}: ARE YOU SERIOUS RIGHT NOW`, `T-Y-P-E  'help'  D-A-M-M-I-T`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: i have been so patient with you`, `TYPE 'help' AND READ IT. SLOWLY.`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: command not found FOR THE LOVE OF—`, `just... 'help'. please. i'm begging.`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: what is WRONG with you`, `'help'. four letters. you can do it.`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: NOT. A. COMMAND.`, `how many times do i have to say 'help' ??`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: i'm a terminal not a miracle worker`, `type 'help' dammit`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: oh my— okay. OKAY. fine.`, `'help'. NOW. before i segfault on purpose.`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: unrecognized, unknown, nonexistent, fake, made up`, `run 'help' or i will kernel panic`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: i've never seen this command in my entire runtime`, `type 'help' RIGHT NOW`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: at this point are you even trying`, `'help'. dammit. 'help'.`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: command not found (i'm losing my mind)`, `HAVE YOU HEARD OF THE COMMAND CALLED 'help'`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: do you think i enjoy this`, `i don't. type 'help'. goodbye.`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: this is the ${Math.floor(Math.random()*8+3)}th time. THE ${Math.floor(Math.random()*8+3)}TH.`, `'help'. i will not ask again.`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: you know what, forget it`, `just type 'help' and pretend this never happened`],
      [`bash: ${esc(cmd.split(/\s+/)[0])}: i am SO tired`, `'help'. that's it. that's the message.`],
    ];

    const roll = Math.random();
    if (roll < 0.05) {
      // 5% — full toxic
      const r = toxic[Math.floor(Math.random() * toxic.length)];
      w(`<span class="r">${r[0]}</span>`);
      w(`<span class="d">${r[1]}</span>`);
    } else if (roll < 0.20) {
      // 15% — mild roast
      const r = roasts[Math.floor(Math.random() * roasts.length)];
      w(`<span class="r">${r[0]}</span>`);
      w(`<span class="d">${r[1]}</span>`);
    } else {
      // 80% — default
      w(`<span class="r">bash: ${esc(cmd.split(/\s+/)[0])}: command not found</span>`);
      w(`<span class="d">type 'help' for available commands</span>`);
    }
    blank();
  }
  scroll();
}

/* ── history ── */
let hist = [], hIdx = -1, saved = '';

inp.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const v = inp.textContent; inp.textContent = '';
    hIdx = -1; saved = '';
    if (v.trim()) { hist.unshift(v); if (hist.length > 200) hist.pop(); }
    await run(v);

  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (hIdx === -1) saved = inp.textContent;
    if (hIdx < hist.length - 1) { inp.textContent = hist[++hIdx]; placeCaretAtEnd(inp); }

  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (hIdx > 0) { inp.textContent = hist[--hIdx]; placeCaretAtEnd(inp); }
    else if (hIdx === 0) { hIdx = -1; inp.textContent = saved; placeCaretAtEnd(inp); }

  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    out.innerHTML = '';

  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    echoCmd(inp.textContent + '^C');
    inp.textContent = ''; blank(); scroll();
  }
});

function placeCaretAtEnd(el) {
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

document.getElementById('term').addEventListener('click', () => inp.focus());
inp.focus();
