<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xiaocia // live</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        :root {
            --bg: #030303;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-gray: #888888;
            --spotify: #1DB954;
            --radius: 24px;
            --muted-red: rgba(255, 255, 255, 0.2); /* Warna blokir yang lebih kalem */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .aurora-bg { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 0% 0%, rgba(255, 59, 142, 0.1), transparent 40%), radial-gradient(circle at 100% 100%, rgba(51, 209, 255, 0.1), transparent 40%); filter: blur(80px); animation: breathe 10s infinite alternate; }
        .grid-overlay { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; mask-image: radial-gradient(circle at center, black 40%, transparent 100%); }
        @keyframes breathe { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        .card { width: 360px; background: rgba(10, 10, 12, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; animation: fadeInUp 0.8s ease-out; }

        .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .status-indicator { position: absolute; bottom: 2px; right: 2px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid #0a0a0c; }
        .user-info h1 { font-size: 1.25rem; font-weight: 700; }
        .user-info span { font-size: 0.85rem; color: var(--text-gray); font-family: 'JetBrains Mono'; }

        .activity-box { margin-bottom: 24px; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: none; align-items: center; gap: 14px; transition: 0.3s; }
        .activity-box.active { background: linear-gradient(90deg, rgba(29, 185, 84, 0.05), rgba(255,255,255,0.02)); border-color: rgba(29, 185, 84, 0.15); }
        .activity-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: rgba(0,0,0,0.5); }
        .activity-text { flex: 1; overflow: hidden; }
        .activity-header { font-size: 0.65rem; font-weight: 800; color: var(--spotify); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .song-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { font-size: 0.75rem; color: var(--text-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .bio-text { font-size: 0.9rem; color: #bbb; line-height: 1.6; margin-bottom: 24px; }

        .links { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .link-btn { height: 50px; border-radius: 12px; background: rgba(255,255,255,0.04); display: flex; justify-content: center; align-items: center; color: var(--text); text-decoration: none; font-size: 1.1rem; transition: 0.2s; position: relative; }
        
        /* Gaya Banned yang lebih subtle */
        .link-btn.banned { cursor: not-allowed; }
        .link-btn.banned i { opacity: 0.15; filter: grayscale(1); }
        .link-btn.banned::after { content: '🚫'; position: absolute; font-size: 1.1rem; color: var(--muted-red); opacity: 0.6; }

        .link-btn:not(.banned):hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
        .link-btn:hover .fa-discord { color: #5865F2; }
        .link-btn:hover .fa-whatsapp { color: #25D366; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .equalizer { display: flex; gap: 2px; height: 8px; }
        .bar { width: 2px; background: var(--spotify); animation: eq 1s infinite alternate; }
        @keyframes eq { 0% { height: 2px; } 100% { height: 8px; } }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>
    <div class="grid-overlay"></div>

    <div class="card" data-tilt data-tilt-max="5">
        <div class="card-header">
            <div style="position: relative;">
                <img src="https://ui-avatars.com/api/?name=X&background=0b0b0b&color=fff" class="avatar" id="avatar">
                <div class="status-indicator" id="statusDot"></div>
            </div>
            <div class="user-info">
                <h1>Xiaocia</h1>
                <span id="username">@loading...</span>
            </div>
        </div>

        <div class="activity-box" id="activityBox">
            <img src="https://i.imgur.com/3QjqZ3p.png" class="activity-img" id="activityImage">
            <div class="activity-text">
                <div class="activity-header">
                    <div class="equalizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                    <span id="activityType">...</span>
                </div>
                <div class="song-title" id="activityMain">...</div>
                <div class="artist-name" id="activitySub">...</div>
            </div>
        </div>

        <p class="bio-text">Front-end enthusiast & digital explorer.<br>Creating aesthetics from chaos. ( ᗜˬᗜ )</p>

        <div class="links">
            <a href="https://discordapp.com/users/630062323448676352" target="_blank" class="link-btn"><i class="fab fa-discord"></i></a>
            <a href="javascript:void(0)" class="link-btn banned"><i class="fab fa-instagram"></i></a>
            <a href="javascript:void(0)" class="link-btn banned"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/33525330188" target="_blank" class="link-btn"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <script>
        const DISCORD_ID = '630062323448676352';

        async function updateLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data, success } = await res.json();
                if (!success) return;

                document.getElementById('username').textContent = `@${data.discord_user.username}`;
                document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png?size=256`;

                const colors = { online: '#4ade80', idle: '#fbbf24', dnd: '#f87171', offline: '#52525b' };
                document.getElementById('statusDot').style.background = colors[data.discord_status] || colors.offline;

                const activityBox = document.getElementById('activityBox');
                const activityImage = document.getElementById('activityImage');

                if (data.spotify) {
                    activityBox.style.display = 'flex';
                    activityBox.classList.add('active');
                    activityImage.src = data.spotify.album_art_url;
                    document.getElementById('activityType').textContent = "LISTENING TO SPOTIFY";
                    document.getElementById('activityMain').textContent = data.spotify.song;
                    document.getElementById('activitySub').textContent = data.spotify.artist;
                } else {
                    const game = data.activities.find(a => a.type === 0);
                    if (game) {
                        activityBox.style.display = 'flex';
                        activityBox.classList.remove('active');
                        
                        // Handler Gambar Game yang lebih kuat
                        let imgUrl = 'https://i.imgur.com/3QjqZ3p.png';
                        if (game.assets && game.assets.large_image) {
                            if (game.assets.large_image.startsWith("mp:")) {
                                imgUrl = `https://media.discordapp.net/${game.assets.large_image.replace("mp:", "")}`;
                            } else if (game.assets.large_image.startsWith("external:")) {
                                imgUrl = `https://media.discordapp.net/external/${game.assets.large_image.split("external:")[1]}`;
                            } else {
                                imgUrl = `https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`;
                            }
                        }
                        activityImage.src = imgUrl;
                        document.getElementById('activityType').textContent = "PLAYING";
                        document.getElementById('activityType').style.color = "#33d1ff";
                        document.getElementById('activityMain').textContent = game.name;
                        document.getElementById('activitySub').textContent = game.details || "In Game";
                    } else {
                        activityBox.style.display = 'none';
                    }
                }
            } catch (e) { console.error(e); }
        }

        VanillaTilt.init(document.querySelector(".card"), { max: 5, speed: 400, glare: true, "max-glare": 0.1 });
        updateLanyard();
        setInterval(updateLanyard, 5000);
    </script>
</body>
</html>
