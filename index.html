<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XIAOCIA // LIVE</title>
</head>

<body>

<div id="app"></div>

<script>
const routes = {
  "/": "glassmorphism.html",
  "/blog": "blog.html",
  "/tools": "tools.html",
  "/about": "about.html"
};

let path = window.location.pathname;

if (!routes[path]) {
  path = "/";
}

fetch(routes[path])
  .then(res => res.text())
  .then(html => {
    document.getElementById("app").innerHTML = html;
  });
</script>

</body>
</html>
