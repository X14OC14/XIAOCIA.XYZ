<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xiaocia // homepage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(255, 255, 255, 0.06); 
            --inner-glass: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --discord: #5865F2;
            --whatsapp: #25D366;
            --spotify: #1DB954;
            --online: #23a55a;
            --idle: #f0b232;
            --dnd: #f23f43;
            --offline: #80848e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'M PLUS Rounded 1c', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-drag: none; }

        html { background-color: #030303; height: 100%; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; height: 100%; background-color: var(--bg); color: var(--text); overflow-x: hidden; overflow-y: auto; position: relative; }

        #wave-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(40px) saturate(200%); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.8s; }
        .overlay-text { font-size: 50px; color: #fff; font-weight: 800; letter-spacing: 15px; opacity: 0.5; }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(6px) saturate(180%) contrast(100%);
            -webkit-backdrop-filter: blur(12px) saturate(180%) contrast(100%);
            border-radius: 40px; padding: 50px 30px; text-align: center; max-width: 380px; width: 92%; 
            opacity: 0; transform: scale(0.9); position: relative; z-index: 1;
            border: none;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
            transition: 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .profile-card::before {
            content: "";
            position: absolute; inset: 0; border-radius: 40px; padding: 3px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.05) 40%, rgba(255,255,255,0.7));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            pointer-events: none; z-index: 20;
        }

        .avatar-container { position: relative; width: 125px; height: 125px; margin: 0 auto 15px; z-index: 15; }
        .user-avatar { width: 105px; height: 105px; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; object-fit: cover; }
        .avatar-deco { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .badges-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; z-index: 15; position: relative; }
        .badge-icon { width: 22px; height: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .profile-info { position: relative; z-index: 15; }
        .profile-info h2 {
            font-weight: 800; margin: 0; font-size: 2rem; letter-spacing: -0.5px;
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.85) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 1px 8px rgba(255,255,255,0.15));
        }
        .profile-info p { font-size: 0.9rem; color: #ccc; margin: 10px 0 25px; line-height: 1.6; opacity: 0.8; font-weight: 300; }

        .status-pill {
            display: inline-flex; align-items: center; gap: 7px;
            margin-bottom: 25px; padding: 7px 16px;
            background: var(--inner-glass); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
            position: relative; z-index: 15;
            transition: color 0.4s, border-color 0.4s;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; flex-shrink: 0; transition: background 0.4s; }
        .status-pill.s-online  { color: var(--online);  border-color: rgba(35,165,90,0.25);  }
        .status-pill.s-idle    { color: var(--idle);    border-color: rgba(240,178,50,0.25); }
        .status-pill.s-dnd     { color: var(--dnd);     border-color: rgba(242,63,67,0.25);  }
        .status-pill.s-offline { color: var(--offline); border-color: rgba(128,132,142,0.25);}
        .status-pill.s-idle .status-dot { background: transparent; border-radius: 50%; box-shadow: inset -3.5px -2.5px 0 0 var(--idle); transform: rotate(-15deg); }
        .status-pill.s-dnd .status-dot { display: flex; align-items: center; justify-content: center; background: var(--dnd); }
        .status-pill.s-dnd .status-dot::before { content: ""; width: 70%; height: 2px; background: rgba(0,0,0,0.6); border-radius: 1px; }

        .activity-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; text-align: left; width: 100%; position: relative; z-index: 15; }
        .status-label { font-size: 0.65rem; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; padding-left: 5px; }
        .status-label span { color: rgba(255, 255, 255, 0.4); text-transform: lowercase; font-weight: 400; }

        .act-card { background: var(--inner-glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 14px; display: flex; align-items: center; gap: 14px; overflow: hidden; }
        .act-img { width: 52px; height: 52px; border-radius: 14px; object-fit: cover; background: #000; flex-shrink: 0; }
        .act-info { flex: 1; min-width: 0; overflow: hidden; }
        .act-info h4 { font-size: 0.85rem; color: #fff; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
        .act-info p { font-size: 0.7rem; color: #aaa; margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; }

        .social-icons { list-style: none; padding: 0; display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; position: relative; z-index: 15; }
        .social-link { text-decoration: none; color: #fff; width: 52px; height: 52px; border-radius: 18px; display: flex; justify-content: center; align-items: center; transition: 0.4s; font-size: 22px; border: 1px solid rgba(255,255,255,0.1); background: var(--inner-glass); }
        .social-link.discord:hover  { background: var(--discord);  box-shadow: 0 10px 20px rgba(88,101,242,0.3); }
        .social-link.whatsapp:hover { background: var(--whatsapp); box-shadow: 0 10px 20px rgba(37,211,102,0.3); }
        .social-link.banned { cursor: not-allowed; opacity: 0.25; filter: grayscale(1); }

        .music-player { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; position: relative; z-index: 15; }
        .music-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .music-icon { font-size: 18px; color: rgba(255,255,255,0.4); flex-shrink: 0; }
        .music-title { font-size: 0.78rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: center; }
        .music-sub { font-size: 0.65rem; color: rgba(255,255,255,0.4); text-align: center; margin-top: 1px; font-weight: 300; }
        .play-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 22px; flex-shrink: 0; }
        .player-controls { display: flex; align-items: center; gap: 12px; }
        .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; transition: height 0.15s; }
        .progress-bar:hover { height: 7px; }
        #progress-fill { height: 100%; background: #fff; width: 0%; pointer-events: none; border-radius: 10px; }

        @media (max-width: 480px) { .profile-card { padding: 40px 20px; border-radius: 35px; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <canvas id="wave-canvas"></canvas>

    <div id="overlay" class="overlay" onclick="startPage()">
        <div class="overlay-text">あ!</div>
    </div>

    <div class="profile-card" id="profile-card">
        <div class="avatar-container">
            <img class="user-avatar" id="main-avatar" src="" alt="">
            <img class="avatar-deco" id="avatar-deco" src="" alt="" style="display:none;">
        </div>
        <div class="badges-container" id="badges-grid"></div>
        <div class="profile-info">
            <h2>ハロー！</h2>
            <p>なまえは しあおしあ です،<br>はじめまして。( ᗜˬᗜ )</p>
        </div>

        <div class="status-pill s-offline" id="status-pill">
            <div class="status-dot"></div>
            <span id="status-label">Offline</span>
        </div>

        <div class="activity-section">
            <div id="game-act" style="display: none;">
                <div class="status-label" style="color: var(--discord);">Playing Now</div>
                <div class="act-card">
                    <img id="game-img" src="" class="act-img">
                    <div class="act-info">
                        <h4 id="game-name">...</h4>
                        <p id="game-detail">...</p>
                    </div>
                </div>
            </div>
            <div id="spotify-act" style="display: none;">
                <div class="status-label" style="color: var(--spotify);">I'm listening to Spotify <span>(not you)</span></div>
                <div class="act-card" style="border-color: rgba(29, 185, 84, 0.2);">
                    <img id="spotify-img" src="" class="act-img">
                    <div class="act-info"><h4 id="spotify-name">...</h4><p id="spotify-artist">...</p></div>
                </div>
            </div>
        </div>

        <div class="social-icons">
            <a href="https://discordapp.com/users/630062323448676352" target="_blank" class="social-link discord"><i class="fab fa-discord"></i></a>
            <a href="javascript:void(0)" class="social-link instagram banned"><i class="fab fa-instagram"></i></a>
            <a href="javascript:void(0)" class="social-link facebook banned"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/33525330188?text=.menu" target="_blank" class="social-link whatsapp"><i class="fab fa-whatsapp"></i></a>
        </div>

        <div class="music-player">
            <audio id="audio-player" loop>
                <source src="ArcaneTheBridge.mp3" type="audio/mpeg">
            </audio>
            <div class="music-meta">
                <i class="fas fa-music music-icon"></i>
                <div style="flex:1; min-width:0;">
                    <div class="music-title">Arcane — The Bridge</div>
                    <div class="music-sub">Arcane OST · League of Legends</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="play-btn" onclick="toggleMusic()" id="play-pause">
                    <i class="fas fa-play"></i>
                </button>
                <div class="progress-bar" id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Wave background ───────────────────────────────────────
        (function () {
            const canvas = document.getElementById('wave-canvas');
            const ctx    = canvas.getContext('2d');

            const LINE_COUNT = 80;
            const LINE_GAP   = 12;
            const STEP       = 4;

            let W, H, t = 0, lines = [];

            function buildLines() {
                lines = [];
                for (let i = 0; i < LINE_COUNT; i++) {
                    lines.push({
                        // three independent sine layers per line, all randomized
                        amp1:   6  + Math.random() * 30,
                        amp2:   3  + Math.random() * 16,
                        amp3:   2  + Math.random() * 10,
                        freq1:  0.002 + Math.random() * 0.01,
                        freq2:  0.004 + Math.random() * 0.014,
                        freq3:  0.008 + Math.random() * 0.02,
                        spd1:   0.015 + Math.random() * 0.055,
                        spd2:   0.01  + Math.random() * 0.045,
                        spd3:   0.02  + Math.random() * 0.07,
                        ph1:    Math.random() * Math.PI * 2,
                        ph2:    Math.random() * Math.PI * 2,
                        ph3:    Math.random() * Math.PI * 2,
                    });
                }
            }

            function resize() {
                W = canvas.width  = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();
            buildLines();

            function drawWaves() {
                ctx.clearRect(0, 0, W, H);

                const totalH = (LINE_COUNT - 1) * LINE_GAP;
                const startY = (H - totalH) / 2;
                const center = (LINE_COUNT - 1) / 2;

                for (let i = 0; i < LINE_COUNT; i++) {
                    const baseY   = startY + i * LINE_GAP;
                    const dist    = Math.abs(i - center) / center;
                    const opacity = 0.05 + (1 - dist) * 0.6;
                    const l       = lines[i];

                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(200, 28, 28, ${opacity})`;
                    ctx.lineWidth   = 0.85;

                    for (let x = 0; x <= W; x += STEP) {
                        const y = baseY
                            + Math.sin(x * l.freq1 + t * l.spd1 + l.ph1) * l.amp1
                            + Math.sin(x * l.freq2 + t * l.spd2 + l.ph2) * l.amp2
                            + Math.sin(x * l.freq3 + t * l.spd3 + l.ph3) * l.amp3;

                        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }

                t += 1;
                requestAnimationFrame(drawWaves);
            }
            drawWaves();
        })();

        // ── Overlay ───────────────────────────────────────────────
        const USER_ID   = '630062323448676352';
        const BADGE_MAP = { 1:"discordstaff", 2:"discordpartner", 4:"hypesquadevents", 8:"bughunterlevel1", 64:"hypesquadbravery", 128:"hypesquadbrilliance", 256:"hypesquadbalance", 512:"earlysupporter", 16384:"bughunterlevel2", 131072:"discordcertifiedmoderator", 4194304:"activedeveloper" };

        function startPage() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 800);
            const card = document.getElementById('profile-card');
            card.style.opacity = '1';
            card.style.transform = 'scale(1) translateY(0)';
            document.getElementById('audio-player').play().then(syncPlayIcon).catch(() => {});
        }

        // ── Music player ──────────────────────────────────────────
        const audioEl      = document.getElementById('audio-player');
        const playBtn      = document.getElementById('play-pause');
        const progressFill = document.getElementById('progress-fill');
        const progressBar  = document.getElementById('progress-bar');

        function syncPlayIcon() { playBtn.innerHTML = audioEl.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>'; }
        function toggleMusic() { audioEl.paused ? audioEl.play() : audioEl.pause(); }

        audioEl.addEventListener('play',  syncPlayIcon);
        audioEl.addEventListener('pause', syncPlayIcon);
        audioEl.addEventListener('timeupdate', () => {
            if (!audioEl.duration) return;
            progressFill.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
        });

        function seekFromPointer(e) {
            if (!audioEl.duration) return;
            const rect  = progressBar.getBoundingClientRect();
            const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audioEl.currentTime = ratio * audioEl.duration;
        }
        let dragging = false;
        progressBar.addEventListener('pointerdown', (e) => { dragging = true; progressBar.setPointerCapture(e.pointerId); seekFromPointer(e); });
        progressBar.addEventListener('pointermove', (e) => { if (dragging) seekFromPointer(e); });
        progressBar.addEventListener('pointerup',     () => { dragging = false; });
        progressBar.addEventListener('pointercancel', () => { dragging = false; });

        // ── Lanyard ───────────────────────────────────────────────
        const STATUS_CONFIG = {
            online:  { cls: 's-online',  label: 'Online'  },
            idle:    { cls: 's-idle',    label: 'Idle'    },
            dnd:     { cls: 's-dnd',     label: 'Do Not Disturb' },
            offline: { cls: 's-offline', label: 'Offline' },
        };

        async function updateLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await res.json();
                const u = data.discord_user;

                document.getElementById('main-avatar').src = `https://cdn.discordapp.com/avatars/${USER_ID}/${u.avatar}.png?size=256`;

                const decoEl = document.getElementById('avatar-deco');
                if (u.avatar_decoration_data) {
                    decoEl.src = `https://cdn.discordapp.com/avatar-decoration-presets/${u.avatar_decoration_data.asset}.png`;
                    decoEl.style.display = 'block';
                } else { decoEl.style.display = 'none'; }

                const grid = document.getElementById('badges-grid');
                grid.innerHTML = '';
                Object.keys(BADGE_MAP).forEach(f => {
                    if (u.public_flags & f)
                        grid.innerHTML += `<img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/${BADGE_MAP[f]}.svg" class="badge-icon">`;
                });

                const status = data.discord_status || 'offline';
                const cfg    = STATUS_CONFIG[status] || STATUS_CONFIG.offline;
                document.getElementById('status-pill').className    = `status-pill ${cfg.cls}`;
                document.getElementById('status-label').textContent = cfg.label;

                const game = data.activities?.find(a => a.type === 0);
                if (game) {
                    document.getElementById('game-act').style.display = 'block';
                    document.getElementById('game-name').innerText    = game.name;
                    document.getElementById('game-detail').innerText  = game.details || 'In Game';
                    let img = 'https://i.imgur.com/3QjqZ3p.png';
                    if (game.assets?.large_image) {
                        if      (game.assets.large_image.startsWith('mp:'))       img = `https://media.discordapp.net/${game.assets.large_image.replace('mp:', '')}`;
                        else if (game.assets.large_image.startsWith('external:')) img = `https://media.discordapp.net/external/${game.assets.large_image.split('external:')[1]}`;
                        else                                                       img = `https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`;
                    }
                    document.getElementById('game-img').src = img;
                } else { document.getElementById('game-act').style.display = 'none'; }

                if (data.listening_to_spotify) {
                    document.getElementById('spotify-act').style.display = 'block';
                    document.getElementById('spotify-name').innerText    = data.spotify.song;
                    document.getElementById('spotify-artist').innerText  = data.spotify.artist;
                    document.getElementById('spotify-img').src           = data.spotify.album_art_url;
                } else { document.getElementById('spotify-act').style.display = 'none'; }

            } catch (e) { console.error(e); }
        }

        updateLanyard();
        setInterval(updateLanyard, 10000);
    </script>
</body>
</html>
