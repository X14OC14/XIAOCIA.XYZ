<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaocia // Ultra Lanyard Display</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f11;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #5865F2;
            --text: #ffffff;
            --text-gray: #b9bbbe;
            --online: #23a55a;
            --dnd: #f23f43;
            --idle: #f0b232;
            --offline: #80848e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .profile-container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* BANNER */
        .banner { height: 120px; background: linear-gradient(45deg, #1a1a1a, #2a2a2a); position: relative; }

        /* AVATAR & DECORATION */
        .avatar-section { position: relative; padding: 0 20px; margin-top: -45px; display: flex; justify-content: space-between; align-items: flex-end; }
        
        .avatar-wrapper { position: relative; width: 94px; height: 94px; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; position: absolute; top: 7px; left: 7px; background: #111; z-index: 1; }
        .decoration-img { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        
        .status-dot { 
            position: absolute; bottom: 8px; right: 8px; width: 22px; height: 22px; 
            border-radius: 50%; border: 4px solid var(--card); z-index: 3; 
        }

        /* BADGES */
        .badges-wrapper { display: flex; gap: 4px; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 5px; }
        .badge-icon { width: 22px; height: 22px; }

        /* CONTENT */
        .profile-body { padding: 16px 20px 24px; }
        .names h1 { font-size: 1.25rem; font-weight: 700; }
        .names p { font-size: 0.9rem; color: var(--text-gray); margin-bottom: 15px; }

        .divider { height: 1px; background: var(--border); margin: 15px 0; }

        /* ACTIVITY SECTION */
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--text-gray); text-transform: uppercase; margin-bottom: 10px; }
        
        .activity-item { display: flex; gap: 12px; align-items: center; margin-top: 10px; }
        .activity-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #000; }
        .activity-info h4 { font-size: 0.85rem; font-weight: 600; }
        .activity-info p { font-size: 0.8rem; color: var(--text-gray); }

        /* DEVICE STATUS */
        .devices { display: flex; gap: 10px; margin-top: 15px; }
        .device { font-size: 0.7rem; color: var(--text-gray); display: flex; align-items: center; gap: 5px; opacity: 0.3; }
        .device.active { opacity: 1; color: var(--online); }

        /* RAW JSON (Hidden but accessible) */
        #debugBtn { background: none; border: 1px solid var(--border); color: var(--text-gray); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; margin-top: 10px; width: 100%; }
        #rawOutput { display: none; font-size: 0.7rem; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; overflow-x: auto; color: #4ade80; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="banner" id="profileBanner"></div>
    
    <div class="avatar-section">
        <div class="avatar-wrapper">
            <img src="" alt="" class="avatar-img" id="mainAvatar">
            <img src="" alt="" class="decoration-img" id="avatarDecoration">
            <div class="status-dot" id="statusDot"></div>
        </div>
        <div class="badges-wrapper" id="badgesList">
            </div>
    </div>

    <div class="profile-body">
        <div class="names">
            <h1 id="displayName">Xiaocia</h1>
            <p id="userName">@xiaocia</p>
        </div>

        <div class="divider"></div>

        <div id="activitySection" style="display:none;">
            <div class="section-title">Playing A Game</div>
            <div class="activity-item">
                <img src="" id="actImg" class="activity-img">
                <div class="activity-info">
                    <h4 id="actName">Game Name</h4>
                    <p id="actDetail">Details</p>
                    <p id="actState" style="font-size:0.7rem">State</p>
                </div>
            </div>
        </div>

        <div id="spotifySection" style="display:none; margin-top: 15px;">
            <div class="section-title">Listening to Spotify</div>
            <div class="activity-item">
                <img src="" id="spotImg" class="activity-img">
                <div class="activity-info">
                    <h4 id="spotTitle">Song Title</h4>
                    <p id="spotArtist">by Artist</p>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-title">Active On</div>
        <div class="devices">
            <span class="device" id="devDesktop"><i class="fas fa-desktop"></i> Desktop</span>
            <span class="device" id="devMobile"><i class="fas fa-mobile-alt"></i> Mobile</span>
            <span class="device" id="devWeb"><i class="fas fa-globe"></i> Web</span>
        </div>

        <button id="debugBtn" onclick="toggleDebug()">Show Raw Data</button>
        <pre id="rawOutput"></pre>
    </div>
</div>

<script>
    const USER_ID = '630062323448676352';

    // Badge Logic (Berdasarkan flags Discord)
    const BADGE_FLAGS = {
        1: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/discordstaff.svg",
        2: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/discordpartner.svg",
        4: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/hypesquadevents.svg",
        8: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/bughunterlevel1.svg",
        64: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/hypesquadbravery.svg",
        128: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/hypesquadbrilliance.svg",
        256: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/hypesquadbalance.svg",
        512: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/earlysupporter.svg",
        16384: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/bughunterlevel2.svg",
        131072: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/discordcertifiedmoderator.svg",
        4194304: "https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/activedeveloper.svg"
    };

    async function updateLanyard() {
        try {
            const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
            const { data } = await res.json();
            const user = data.discord_user;

            // 1. Basic Info
            document.getElementById('displayName').innerText = user.global_name || user.username;
            document.getElementById('userName').innerText = `@${user.username}`;
            document.getElementById('mainAvatar').src = `https://cdn.discordapp.com/avatars/${USER_ID}/${user.avatar}.png?size=256`;
            document.getElementById('rawOutput').innerText = JSON.stringify(data, null, 2);

            // 2. Avatar Decoration
            const decoImg = document.getElementById('avatarDecoration');
            if(user.avatar_decoration_data) {
                decoImg.src = `https://cdn.discordapp.com/avatar-decoration-presets/${user.avatar_decoration_data.asset}.png`;
                decoImg.style.display = 'block';
            } else {
                decoImg.style.display = 'none';
            }

            // 3. Status
            const statusColors = { online: '#23a55a', dnd: '#f23f43', idle: '#f0b232', offline: '#80848e' };
            document.getElementById('statusDot').style.background = statusColors[data.discord_status] || statusColors.offline;

            // 4. Badges
            const badgesList = document.getElementById('badgesList');
            badgesList.innerHTML = '';
            // Nitro Badge (Check manually since it's not in public_flags typically but Lanyard sometimes provides info via collectibles/premium)
            // Di sini kita cek flags saja dulu
            Object.keys(BADGE_FLAGS).forEach(flag => {
                if(user.public_flags & flag) {
                    badgesList.innerHTML += `<img src="${BADGE_FLAGS[flag]}" class="badge-icon">`;
                }
            });

            // 5. Devices
            document.getElementById('devDesktop').className = data.active_on_discord_desktop ? 'device active' : 'device';
            document.getElementById('devMobile').className = data.active_on_discord_mobile ? 'device active' : 'device';
            document.getElementById('devWeb').className = data.active_on_discord_web ? 'device active' : 'device';

            // 6. Games Activity (Type 0)
            const game = data.activities.find(a => a.type === 0);
            const actSection = document.getElementById('activitySection');
            if(game) {
                actSection.style.display = 'block';
                document.getElementById('actName').innerText = game.name;
                document.getElementById('actDetail').innerText = game.details || 'Playing';
                document.getElementById('actState').innerText = game.state || '';
                
                let imgUrl = 'https://i.imgur.com/3QjqZ3p.png';
                if(game.assets && game.assets.large_image) {
                    if(game.assets.large_image.startsWith("mp:")) imgUrl = `https://media.discordapp.net/${game.assets.large_image.replace("mp:", "")}`;
                    else if(game.assets.large_image.startsWith("external:")) imgUrl = `https://media.discordapp.net/external/${game.assets.large_image.split("external:")[1]}`;
                    else imgUrl = `https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`;
                }
                document.getElementById('actImg').src = imgUrl;
            } else {
                actSection.style.display = 'none';
            }

            // 7. Spotify
            const spotSection = document.getElementById('spotifySection');
            if(data.listening_to_spotify) {
                spotSection.style.display = 'block';
                document.getElementById('spotTitle').innerText = data.spotify.song;
                document.getElementById('spotArtist').innerText = `by ${data.spotify.artist}`;
                document.getElementById('spotImg').src = data.spotify.album_art_url;
            } else {
                spotSection.style.display = 'none';
            }

        } catch (e) { console.error(e); }
    }

    function toggleDebug() {
        const out = document.getElementById('rawOutput');
        out.style.display = out.style.display === 'none' ? 'block' : 'none';
    }

    updateLanyard();
    setInterval(updateLanyard, 5000);
</script>
</body>
</html>
