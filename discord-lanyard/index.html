<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaocia // Lanyard Inspector</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --dnd: #ef4444;
            --online: #22c55e;
            --idle: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }

        .container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* Common Card Style */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        h2 { font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* Profile Section */
        .profile-card { grid-column: span 2; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; }
        .avatar-box { position: relative; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--border); }
        .status-dot { position: absolute; bottom: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; border: 3px solid var(--card); }

        .user-meta h1 { font-size: 1.5rem; }
        .user-meta p { color: var(--text-muted); font-family: monospace; }
        
        .device-info { margin-left: auto; display: flex; gap: 10px; }
        .device-tag { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; background: var(--border); color: var(--text-muted); }
        .device-tag.active { background: rgba(59, 130, 246, 0.2); color: var(--accent); border: 1px solid var(--accent); }

        /* Info Grid */
        .info-grid { display: grid; gap: 10px; }
        .info-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .info-item span:first-child { color: var(--text-muted); }

        /* Activity / Spotify */
        .activity-content { display: flex; gap: 15px; align-items: center; }
        .activity-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        
        /* Raw JSON */
        .json-card { grid-column: span 2; }
        pre { background: #000; padding: 15px; border-radius: 8px; font-size: 0.8rem; overflow-x: auto; color: #4ade80; border: 1px solid #1a1a1a; }

        @media (max-width: 600px) { .container { grid-template-columns: 1fr; } .profile-card { flex-direction: column; text-align: center; } .device-info { margin: 10px auto; } .profile-card { grid-column: span 1; } .json-card { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="card profile-card">
            <div class="avatar-box">
                <img id="avatar" src="" alt="Avatar" class="avatar">
                <div id="statusDot" class="status-dot"></div>
            </div>
            <div class="user-meta">
                <h1 id="globalName">Loading...</h1>
                <p id="username">@username</p>
                <div id="guildTag" style="margin-top: 5px; font-size: 0.8rem; color: var(--accent)"></div>
            </div>
            <div class="device-info" id="devices">
                <div class="device-tag" id="web">Web</div>
                <div class="device-tag" id="desktop">PC</div>
                <div class="device-tag" id="mobile">Mobile</div>
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-info-circle"></i> User Details</h2>
            <div class="info-grid">
                <div class="info-item"><span>User ID</span><span id="userId">-</span></div>
                <div class="info-item"><span>Bot?</span><span id="isBot">No</span></div>
                <div class="info-item"><span>Public Flags</span><span id="flags">-</span></div>
                <div class="info-item"><span>Discriminator</span><span id="discrim">-</span></div>
            </div>
        </div>

        <div class="card" id="activityCard">
            <h2><i class="fas fa-gamepad"></i> Current Activity</h2>
            <div id="activityContent" class="activity-content">
                <p style="color: var(--text-muted)">No game detected</p>
            </div>
        </div>

        <div class="card" id="spotifyCard">
            <h2><i class="fab fa-spotify"></i> Spotify</h2>
            <div id="spotifyContent">
                <p style="color: var(--text-muted)">Not listening</p>
            </div>
        </div>

        <div class="card json-card">
            <h2><i class="fas fa-code"></i> Raw JSON Output</h2>
            <pre id="rawJson">Fetching data...</pre>
        </div>
    </div>

    <script>
        const USER_ID = '630062323448676352';

        async function fetchLanyard() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await response.json();
                
                // Update Raw JSON
                document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);

                // Update Profile
                const user = data.discord_user;
                document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256`;
                document.getElementById('globalName').textContent = user.global_name || user.username;
                document.getElementById('username').textContent = `@${user.username}`;
                document.getElementById('userId').textContent = user.id;
                document.getElementById('isBot').textContent = user.bot ? 'Yes' : 'No';
                document.getElementById('flags').textContent = user.public_flags;
                document.getElementById('discrim').textContent = `#${user.discriminator}`;

                if (user.primary_guild) {
                    document.getElementById('guildTag').textContent = `[${user.primary_guild.tag}] Member`;
                }

                // Update Status
                const statusColors = { dnd: '#ef4444', online: '#22c55e', idle: '#f59e0b', offline: '#71717a' };
                document.getElementById('statusDot').style.background = statusColors[data.discord_status];

                // Update Devices
                document.getElementById('web').classList.toggle('active', data.active_on_discord_web);
                document.getElementById('desktop').classList.toggle('active', data.active_on_discord_desktop);
                document.getElementById('mobile').classList.toggle('active', data.active_on_discord_mobile);

                // Update Activity
                const activityContent = document.getElementById('activityContent');
                const game = data.activities.find(a => a.type === 0);
                if (game) {
                    let img = 'https://i.imgur.com/3QjqZ3p.png';
                    if (game.assets && game.assets.large_image) {
                        img = game.assets.large_image.startsWith('mp:') 
                            ? `https://media.discordapp.net/${game.assets.large_image.replace('mp:', '')}`
                            : `https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`;
                    }
                    activityContent.innerHTML = `
                        <img src="${img}" class="activity-img">
                        <div>
                            <div style="font-weight:bold">${game.name}</div>
                            <div style="font-size:0.8rem; color:var(--text-muted)">${game.details || 'In Game'}</div>
                            <div style="font-size:0.7rem; color:var(--accent)">via ${game.platform || 'Unknown'}</div>
                        </div>
                    `;
                } else {
                    activityContent.innerHTML = `<p style="color: var(--text-muted)">No game detected</p>`;
                }

                // Update Spotify
                const spotifyContent = document.getElementById('spotifyContent');
                if (data.listening_to_spotify && data.spotify) {
                    spotifyContent.innerHTML = `
                        <div class="activity-content">
                            <img src="${data.spotify.album_art_url}" class="activity-img">
                            <div>
                                <div style="font-weight:bold">${data.spotify.song}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted)">by ${data.spotify.artist}</div>
                            </div>
                        </div>
                    `;
                } else {
                    spotifyContent.innerHTML = `<p style="color: var(--text-muted)">Not listening</p>`;
                }

            } catch (err) {
                console.error("Error fetching Lanyard:", err);
            }
        }

        fetchLanyard();
        setInterval(fetchLanyard, 10000); // Auto refresh tiap 10 detik
    </script>
</body>
</html>
