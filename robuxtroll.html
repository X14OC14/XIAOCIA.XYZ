<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>😭</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #030303;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 48px 36px;
    max-width: 380px;
    width: 92%;
    border-radius: 40px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    box-shadow: 0 30px 60px -12px rgba(0,0,0,0.8);
    animation: floatIn 0.6s cubic-bezier(.23,1.2,.6,1) both;
  }

  /* Border gradient tipis */
  .container::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 40px;
    padding: 2px;
    background: linear-gradient(135deg, rgba(255,255,255,0.35), rgba(255,255,255,0.04) 40%, rgba(255,255,255,0.6));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: scale(0.7) translateY(40px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .emoji {
    font-size: clamp(80px, 20vw, 140px);
    display: block;
    animation: wiggle 0.4s ease infinite alternate;
    filter: drop-shadow(0 0 30px rgba(255,50,50,0.6));
    line-height: 1;
    margin-bottom: 24px;
  }

  @keyframes wiggle {
    from { transform: rotate(-8deg) scale(1); }
    to   { transform: rotate(8deg) scale(1.08); }
  }

  .title {
    font-size: clamp(26px, 7vw, 48px);
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.85) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title span {
    background: linear-gradient(90deg, #ff3c3c, #ff9900);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: clamp(11px, 3vw, 13px);
    color: rgba(255,255,255,0.35);
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .card {
    display: inline-block;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 16px 28px;
    color: rgba(255,255,255,0.4);
    font-size: clamp(11px, 2.5vw, 13px);
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, color 0.25s, background 0.25s;
    font-family: 'Nunito', sans-serif;
  }

  .card:hover {
    border-color: rgba(255,60,60,0.5);
    color: #fff;
    background: rgba(255,60,60,0.08);
  }

  #wave-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Background noise */
  .noise {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 1;
  }

  /* Red glow bg */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,40,40,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50%       { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
  }
</style>
</head>
<body>

<canvas id="wave-canvas"></canvas>
<div class="glow"></div>

<div class="container">
  <span class="emoji">🕵️</span>
  <div class="title">Hayoo,<br><span>mau ngapain?</span></div>
  <div class="subtitle">gak ada yang bisa kamu temuin di sini</div>
  <a class="card" href="../robux-redeem-code/">← Balik ke Giveaway</a>
</div>

<script>
  // ── Wave background (sama persis kayak homepage) ──────────────────
  (function () {
    const canvas = document.getElementById('wave-canvas');
    const ctx    = canvas.getContext('2d');

    const LINE_COUNT = 80;
    const LINE_GAP   = 12;
    const STEP       = 4;

    let W, H, t = 0, lines = [];

    function buildLines() {
      lines = [];
      for (let i = 0; i < LINE_COUNT; i++) {
        lines.push({
          amp1:  6  + Math.random() * 30,
          amp2:  3  + Math.random() * 16,
          amp3:  2  + Math.random() * 10,
          freq1: 0.002 + Math.random() * 0.01,
          freq2: 0.004 + Math.random() * 0.014,
          freq3: 0.008 + Math.random() * 0.02,
          spd1:  0.015 + Math.random() * 0.055,
          spd2:  0.01  + Math.random() * 0.045,
          spd3:  0.02  + Math.random() * 0.07,
          ph1:   Math.random() * Math.PI * 2,
          ph2:   Math.random() * Math.PI * 2,
          ph3:   Math.random() * Math.PI * 2,
        });
      }
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();
    buildLines();

    function drawWaves() {
      ctx.clearRect(0, 0, W, H);

      const totalH = (LINE_COUNT - 1) * LINE_GAP;
      const startY = (H - totalH) / 2;
      const center = (LINE_COUNT - 1) / 2;

      for (let i = 0; i < LINE_COUNT; i++) {
        const baseY   = startY + i * LINE_GAP;
        const dist    = Math.abs(i - center) / center;
        const opacity = 0.05 + (1 - dist) * 0.6;
        const l       = lines[i];

        ctx.beginPath();
        ctx.strokeStyle = `rgba(200, 28, 28, ${opacity})`;
        ctx.lineWidth   = 0.85;

        for (let x = 0; x <= W; x += STEP) {
          const y = baseY
            + Math.sin(x * l.freq1 + t * l.spd1 + l.ph1) * l.amp1
            + Math.sin(x * l.freq2 + t * l.spd2 + l.ph2) * l.amp2
            + Math.sin(x * l.freq3 + t * l.spd3 + l.ph3) * l.amp3;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      t += 1;
      requestAnimationFrame(drawWaves);
    }
    drawWaves();
  })();
</script>
</body>
</html>
